<!-- index.html フィルター強化版 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>アイプリカード管理</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

<header>
<h1>ひみつのアイプリ / おねがいアイプリ</h1>
<p>カード管理システム</p>
</header>

<section class="toolbar">

<div class="filter-block">
<div class="filter-title">レア</div>
<div id="rarityChecks" class="check-wrap"></div>
</div>

<details class="filter-block">
<summary>弾フィルター</summary>
<div class="mini-btns">
<button type="button" onclick="toggleAll('wave',true)">全選択</button>
<button type="button" onclick="toggleAll('wave',false)">全解除</button>
</div>
<div id="waveChecks" class="check-wrap"></div>
</details>

<details class="filter-block">
<summary>キャラフィルター</summary>
<div class="mini-btns">
<button type="button" onclick="toggleAll('character',true)">全選択</button>
<button type="button" onclick="toggleAll('character',false)">全解除</button>
</div>
<div id="characterChecks" class="check-wrap"></div>
</details>

<label><input type="checkbox" id="dupOnly">ダブり</label>
<label><input type="checkbox" id="wantOnly">求</label>
<label><input type="checkbox" id="noneOnly">未所持</label>

<input type="text" id="searchBox" placeholder="ID・衣装名検索">

</section>

<section class="toolbar2">
<button id="saveAll">一覧画像保存</button>
<button id="saveWant">求カード画像</button>
</section>

<section class="status">
<span id="totalCards">0件表示</span>
<span id="ownedCards">所持0</span>
<span id="wantedCards">求0</span>
</section>

<main id="captureArea">
<section id="cardList"></section>
</main>

<script src="script.js"></script>

</body>
</html>
