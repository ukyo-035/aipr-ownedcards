<!-- index.html 完全動作版 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>アイプリカード管理 完全版</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

<header>
<h1>ひみつのアイプリ / おねがいアイプリ</h1>
<p>カード管理システム</p>
</header>

<section class="toolbar">

<select id="filterRarity">
<option value="">レア全て</option>
</select>

<select id="filterWave">
<option value="">弾全て</option>
</select>

<select id="filterCharacter">
<option value="">キャラ全て</option>
</select>

<label><input type="checkbox" id="dupOnly">ダブり</label>
<label><input type="checkbox" id="wantOnly">求</label>
<label><input type="checkbox" id="noneOnly">未所持</label>

<input type="text" id="searchBox" placeholder="ID・衣装名検索">

</section>

<section class="toolbar2">
<button id="saveAll">一覧画像保存</button>
<button id="saveWant">求カード画像</button>
</section>

<section class="status">
<span id="totalCards">0枚</span>
<span id="ownedCards">所持0</span>
<span id="wantedCards">求0</span>
</section>

<main id="captureArea">
<section id="cardList"></section>
</main>

<script src="script.js"></script>

</body>
</html>
