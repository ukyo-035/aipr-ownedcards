<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>アイプリカード管理</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>ひみつのアイプリ / おねがいアイプリ</h1>
<p>カード管理コレクション</p>
</header>

<section class="controls">

<select id="sortType">
<option value="default">並び替え</option>
<option value="character">キャラ順</option>
<option value="wave">弾順</option>
<option value="rarity">レア順</option>
</select>

<input type="text" id="searchBox" placeholder="カードID検索">

</section>

<section class="status">
<span id="totalCards">0枚</span>
<span id="ownedCards">所持0</span>
<span id="wantedCards">求0</span>
</section>

<main id="cardList"></main>

<script src="script.js"></script>
</body>
</html>
